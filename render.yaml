services:
  - type: web
    name: health-hdp-predictor
    runtime: python
    pythonVersion: 3.11
    plan: free
    
    # Build configuration
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=10000 --server.address=0.0.0.0
    
    # Environment variables
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        scope: build,runtime
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: STREAMLIT_SERVER_PORT
        value: "10000"
      - key: STREAMLIT_SERVER_ADDRESS
        value: "0.0.0.0"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_SERVER_RUNONSAVE
        value: "true"
    
    # Auto-deploy on GitHub push
    repo: https://github.com/GraceKaimburi/HEALTH
    branch: main
    autoDeploy: true
    
    # Health check
    healthCheckPath: /
    healthCheckWaitOnDeploy: 30
    
    # Disk and memory
    disk:
      name: health_data
      mountPath: /var/data
      sizeGB: 1
